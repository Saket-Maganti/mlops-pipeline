name: Drift Benchmark CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements/training.txt
          pip install -r requirements/api.txt
          pip install -r requirements/test.txt

      - name: Lint
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  benchmark:
    name: Benchmark Suite
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install benchmark dependencies
        run: |
          pip install -r requirements/training.txt
          pip install -r requirements/api.txt

      - name: Run drift benchmark
        run: python src/benchmark/runner.py --output-dir reports/benchmark --config configs/benchmark_config.yaml

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: drift-benchmark-report
          path: reports/benchmark/
