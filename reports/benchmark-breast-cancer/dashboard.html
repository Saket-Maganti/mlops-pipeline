<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drift Benchmark Dashboard</title>
  <style>
    :root {
      --bg: #f3efe6;
      --panel: #fffaf2;
      --ink: #1e2a2f;
      --muted: #6f7c80;
      --accent: #0c7c59;
      --accent-2: #f28f3b;
      --border: #d7d0c4;
    }
    body {
      margin: 0;
      font-family: Georgia, "Iowan Old Style", serif;
      background: radial-gradient(circle at top left, #fff7e8, var(--bg) 55%);
      color: var(--ink);
    }
    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    .hero {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 18px;
      margin-bottom: 20px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(30, 42, 47, 0.06);
    }
    h1, h2, h3 { margin: 0 0 12px; }
    p { color: var(--muted); line-height: 1.5; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
    }
    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(12, 124, 89, 0.10);
      color: var(--accent);
      font-size: 12px;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    .winner {
      font-weight: 700;
      color: var(--accent);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }
    .metric {
      font-size: 28px;
      font-weight: 700;
    }
    .spark {
      display: grid;
      gap: 8px;
    }
    .bar {
      height: 10px;
      background: rgba(12, 124, 89, 0.14);
      border-radius: 999px;
      overflow: hidden;
    }
    .bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }
    @media (max-width: 900px) {
      .hero, .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
